<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물리치료실 실시간 현황판</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js" defer></script>
</head>
<body>

    <div id="loginSection" class="login-wrapper">
        <div class="login-card">
            <h2>🏥 물리치료실 실시간 현황판</h2>
            <p class="login-subtitle">팀방을 만들거나 생성된 방으로 접속하세요.</p>
            
            <div class="login-main-btns" id="loginMainBtns">
                <button class="btn-login-action create" onclick="showLoginSub('create')">➕ 팀방 만들기</button>
                <button class="btn-login-action join" onclick="showLoginSub('join')" style="font-weight: bold;">🚪 팀방 접속하기</button>
            </div>

            <div id="loginFormArea" class="login-form-area" style="display: none;">
                <h3 id="formTitle">팀방 정보 입력</h3>
                
                <div class="login-input-group">
                    <label for="roomName">팀방 이름 (병원명 또는 치료실 이름)</label>
                    <input type="text" id="roomName" placeholder="예: 서울병원PT">
                </div>
                
                <div class="login-input-group">
                    <label for="roomPassword">공용 비밀번호</label>
                    <input type="password" id="roomPassword" placeholder="••••••••">
                </div>

                <div class="form-btn-group">
                    <button class="btn-back" onclick="hideLoginSub()">뒤로가기</button>
                    <button class="btn-submit" id="btnSubmitForm" onclick="handleRoomAuth()">확인</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-wrapper" style="display: none;">
        <div class="top-navbar">
            <div class="logo-area">
                <h2>🏥 실시간 현황판 (<span id="currentRoomLabel" style="color: #217346;">-</span>)</h2>
            </div>
            <div class="menu-area">
                <button class="btn-logout" onclick="handleLogout()" style="margin-right: 10px; background: #f44336; color:#fff; border:none; padding:8px 12px; border-radius:4px; font-weight:bold; cursor:pointer;">로그아웃</button>
                <button class="btn-setup-trigger" onclick="openSetupModal()">⚙️ 전체 설정</button>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="excel-container">
                <div class="excel-header-row" id="excelHeaderRow"></div>
                <div class="excel-sub-header-row" id="excelSubHeaderRow"></div>
                <div class="excel-body" id="excelBody"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="setupModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🛠️ 물리치료실 환경 설정 (로컬)</h3>
                <button class="btn-close" onclick="closeSetupModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="setup-section">
                    <h4>👨‍⚕️ 담당 치료사 라인업 관리</h4>
                    <div class="tag-container" id="staffTagList"></div>
                    <div class="input-group">
                        <input type="text" id="inputStaffName" placeholder="예: 철수T">
                        <button onclick="addStaffTag()">치료사 등록</button>
                    </div>
                </div>
                <div class="setup-section">
                    <h4>⏱️ 치료 및 타이머 시간 관리(원하는 대로 변경 가능)</h4>
                    <p class="setup-desc">치료 명칭과 기본 타이머 제한 시간(분)을 입력하세요.</p>
                    <div class="tag-container" id="treatmentTagList"></div>
                    <div class="input-group">
                        <input type="text" id="inputTreatName" placeholder="예: 도수" style="flex: 2;">
                        <input type="number" id="inputTreatMin" placeholder="분" style="flex: 1;">
                        <button onclick="addTreatmentPreset()">치료 등록</button>
                    </div>
                </div>
            </div>
            
            <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; padding: 15px 20px;">
                <button onclick="triggerResetAllPatients()" style="background-color: #d9534f; color: white; border: none; padding: 10px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px;">
                    🧹 환자 초기화
                </button>
                
                <button class="btn-save" onclick="applySettingsLocal()">💾 설정 적용 및 화면 갱신</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="treatConfigModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>치료 항목 개별 설정</h3>
                <button class="btn-close" onclick="closeTreatConfigModal()">✕</button>
            </div>
            <div class="modal-body" id="treatConfigList"></div>
            <div class="modal-footer">
                <button class="btn-save" onclick="saveTreatConfig()">선택 적용</button>
            </div>
        </div>
    </div>

</body>
</html>
